      <stop offset="0.45" stop-color="#2CE3FF" stop-opacity="0.18"></stop>
      <stop offset="1" stop-color="#2CE3FF" stop-opacity="0.04"></stop>
    </linearGradient>

    <linearGradient id="midnightHandle" x1="358" y1="230" x2="386" y2="716" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2F7FA"></stop>
      <stop offset="0.5" stop-color="#A7B7C4"></stop>
      <stop offset="1" stop-color="#E6EEF4"></stop>
    </linearGradient>

    <filter id="midnightShadow" x="26" y="10" width="448" height="970" filterUnits="userSpaceOnUse">
