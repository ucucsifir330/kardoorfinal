    <rect x="112" y="88" width="78" height="824" rx="8" fill="#050A10" fill-opacity="0.48"></rect>
    <rect x="124" y="106" width="28" height="788" rx="14" fill="url(#midnightGlass)"></rect>
    <rect x="162" y="106" width="10" height="788" rx="5" fill="#FFFFFF" fill-opacity="0.08"></rect>

