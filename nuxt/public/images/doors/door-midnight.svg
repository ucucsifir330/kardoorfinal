<svg width="500" height="980" viewBox="0 0 500 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="midnightPanel" x1="80" y1="30" x2="430" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#202D3B"></stop>
      <stop offset="0.42" stop-color="#101B28"></stop>
      <stop offset="1" stop-color="#07101A"></stop>
    </linearGradient>

    <linearGradient id="midnightFrame" x1="58" y1="20" x2="444" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8EA3B6" stop-opacity="0.72"></stop>
      <stop offset="0.24" stop-color="#263645"></stop>
      <stop offset="1" stop-color="#0B1118"></stop>
    </linearGradient>

    <linearGradient id="midnightGlass" x1="122" y1="96" x2="184" y2="888" gradientUnits="userSpaceOnUse">
