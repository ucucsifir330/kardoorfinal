<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Katalog Gorselleri</title>
    <style>
      body {
        margin: 0;
        background: #f4f1ea;
        color: #14151d;
        font-family: Arial, sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        background: #14151d;
        color: #ffffff;
      }

      main {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 14px;
        padding: 18px;
      }

      figure {
        margin: 0;
        overflow: hidden;
        background: #ffffff;
        border: 1px solid rgba(20, 21, 29, 0.16);
        border-radius: 8px;
      }

      img {
        display: block;
        width: 100%;
        height: 190px;
        object-fit: contain;
        background: #e8e4dc;
      }

      figcaption {
        padding: 8px;
        text-align: center;
        font-size: 12px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Katalog gorselleri</strong>
      <span>169 dosya, numara sirasiyla</span>
    </header>
    <main id="gallery"></main>
    <script>
      const gallery = document.querySelector("#gallery");

      for (let index = 1; index <= 169; index += 1) {
        const number = String(index).padStart(2, "0");
        const filename = `Image${number}.webp`;
        const figure = document.createElement("figure");
        figure.innerHTML = `
          <img src="/images/katalogwebp/${filename}" alt="${filename}" loading="lazy">
          <figcaption>${filename}</figcaption>
        `;
        gallery.append(figure);
      }
    </script>
  </body>
</html>
